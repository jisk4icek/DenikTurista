# ─────────────────────────────────────────────
#  MILNÍKY – ODMĚNY ZA POČET ZNÁMEK
#
#  Podporované typy příkazů:
#   ● "give %player% diamond 5"              → Předmět hráči
#   ● "eco give %player% 1000"               → EssentialsX peníze
#   ● "lp user %player% parent add vip"      → LuckPerms rank
#   ● "lp user %player% meta setprefix 100 [Turista]" → Prefix
#   ● "broadcast &e%player% &7nasbíral X"   → Chat broadcast
#   ● "title %player% &6Gratulace!|&7Dosáhl jsi N znamek" → Title/Subtitle
#   ● "crates give %player% turisticky 1"   → Crate klíč
# ─────────────────────────────────────────────
milestones:
  1:
    commands:
      - "broadcast &7[&bTuristika&7] &aHráč &e%player% &azískal svou první turistickou známku!"
  5:
    commands:
      - "give %player% diamond 3"
      - "broadcast &7[&bTuristika&7] &e%player% &7nasbíral &e5 &7turistických známek!"
      - "title %player% &e5 Turistických Známek!|&7Gratuluji, průzkumníku!"
  10:
    commands:
      - "give %player% diamond 10"
      - "lp user %player% meta setprefix 100 [&6Turista&r]"
      - "broadcast &7[&bTuristika&7] &6%player% &7dosahuje &6ZLATÉHO &7milníku – &e10 zna mek!"
      - "title %player% &6✦ ZLATÝ TURISTA ✦|&710 zna mek nasbíráno!"

# ─────────────────────────────────────────────
#  STREAK ODMĚNY – ODMĚNY ZA PO SOBĚ JDOUCÍ DNY
#
#  Hráč musí každý den najít alespoň 1 novou zna mku.
#  Pokud den vynechá, streak se resetuje.
# ─────────────────────────────────────────────
streak_rewards:
  3:
    commands:
      - "give %player% experience_bottle 5"
      - "broadcast &e%player% &7má &63 dny &7v řadě turistický streak!"
  7:
    commands:
      - "give %player% diamond 2"
      - "lp user %player% meta setprefix 100 [&5Výzkumník&r]"
      - "title %player% &57 Dní Streak!|&7Jsi opravdový průzkumník BasicLandu!"
  14:
    commands:
      - "give %player% netherite_ingot 1"
      - "give %player% diamond_block 2"
      - "broadcast &d%player% &7má ohromujicich &d14 dní &7turistického streaku!"
      - "title %player% &d⚡ MEGA STREAK ⚡|&714 dní bez přestávky!"

